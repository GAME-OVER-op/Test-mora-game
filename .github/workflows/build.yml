name: Android Build

on:
  push:
    branches: [ main, master ]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
      - name: Install Android SDK packages
        run: |
          sdkmanager "platforms;android-36" "build-tools;36.0.0" "platform-tools"
      - name: Set up Gradle 9.4.1
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 9.4.1
      - name: Generate fallback release keystore
        run: |
          keytool -genkeypair -v \
            -keystore "$RUNNER_TEMP/gamespace-release.keystore" \
            -storepass android \
            -alias androiddebugkey \
            -keypass android \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -dname "CN=GameSpace Debug,O=Mora,C=US"
          echo "GAMESPACE_RELEASE_KEYSTORE=$RUNNER_TEMP/gamespace-release.keystore" >> "$GITHUB_ENV"
      - name: Build debug and release
        run: gradle :app:assembleDebug :app:assembleRelease --stacktrace
      - name: Upload APKs
        uses: actions/upload-artifact@v4
        with:
          name: GameSpace-apks
          path: app/build/outputs/apk/**/*.apk
